services:
  mysql:
    image: mysql:8.4
    container_name: studio-book-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: studio_book_db
      MYSQL_USER: studio
      MYSQL_PASSWORD: studio_pass
    ports:
      - "3306:3306"
    volumes:
      - studio-book-mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci

volumes:
  studio-book-mysql-data: