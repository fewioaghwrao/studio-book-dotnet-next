services:
  mysql:
    image: mysql:8.4
    container_name: studio-book-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: studio_book_db
      MYSQL_USER: studio
      MYSQL_PASSWORD: studio_pass

    ports:
      - "3306:3306"

    volumes:
      - studio-book-mysql-data:/var/lib/mysql

    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Backend/Studiobook_backend/Dockerfile

    container_name: studio-book-api
    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=studio_book_db;User=studio;Password=studio_pass;CharSet=utf8mb4;

      Jwt__Issuer: StudioBookApi
      Jwt__Audience: StudioBookClient
      Jwt__SigningKey: local-development-secret-key-for-studio-book-please-change
      Jwt__AccessTokenMinutes: "60"

      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://127.0.0.1:3000

      ENABLE_SWAGGER: "true"
      ENABLE_DB_MIGRATION: "true"
      ENABLE_DB_SEED: "true"

      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      OpenAI__ApiKey: ${OPENAI_API_KEY:-}

    ports:
      - "5000:8080"

volumes:
  studio-book-mysql-data: